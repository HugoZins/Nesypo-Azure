services:
  db:
    image: postgres:15
    container_name: todo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nesypo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: todo-backend
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - nesypo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: todo-frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - nesypo-network

volumes:
  db_data:
  backend_vendor:
  frontend_node_modules:

networks:
  nesypo-network:
    driver: bridge