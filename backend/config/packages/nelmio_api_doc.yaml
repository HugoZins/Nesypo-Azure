nelmio_api_doc:
    documentation:
        info:
            title: My API
            description: Documentation de l’API
            version: 1.0.0

        components:
            securitySchemes:
                cookieAuth:
                    type: apiKey
                    in: cookie
                    name: token
            security:
                -   cookieAuth: [ ]


    areas: # to filter documented areas
        path_patterns:
            - ^/api(?!/doc$) # Accepts routes under /api except /api/doc
